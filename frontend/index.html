<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Sistema de Gestión Académica — GA7-220501096-AA5-EV03</title>
    <!-- SPA redirect: restaura la ruta codificada por 404.html en GitHub Pages -->
    <script>
      (function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function (s) {
            return s.replace(/~and~/g, '&');
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
    <!-- Aplica el tema guardado antes de que React cargue para evitar flash -->
    <script>
      (function () {
        var t = localStorage.getItem('theme');
        document.documentElement.dataset.theme = t === 'dark' ? 'dark' : 'light';
      })();
    </script>
  </head>
  <body>
    <!-- Punto de montaje de la aplicación React -->
    <div id="root"></div>
    <!-- Vite inyecta el script del bundle de React aquí -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
