<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <!--
      SPA Redirect — GitHub Pages sirve este 404.html cuando se accede
      directamente a una ruta como /estudiantes o /dashboard.
      Codifica la ruta como query-string y redirige a index.html,
      donde el script en index.html la restaura antes de que React monte.

      Basado en: https://github.com/rafgraph/spa-github-pages
      segmentCount = 1  →  /nombre-repo/
    -->
    <script>
      // HashRouter: redirige /repo/ruta → /repo/#/ruta
      var segmentCount = 1;
      var l = window.location;
      var base = l.pathname.split('/').slice(0, 1 + segmentCount).join('/');
      var rest = l.pathname.slice(1).split('/').slice(segmentCount).join('/');
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        base + '/#/' + rest +
        (l.search ? l.search : '') +
        (l.hash && l.hash !== '#/' + rest ? l.hash : '')
      );
    </script>
  </head>
  <body></body>
</html>
