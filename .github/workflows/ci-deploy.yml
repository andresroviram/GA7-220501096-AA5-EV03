name: CI / Deploy Frontend

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

# Permisos necesarios para el despliegue oficial en GitHub Pages
permissions:
    contents: read
    pages: write
    id-token: write

# Evita despliegues concurrentes; espera a que termine el anterior
concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    # ── Build ──────────────────────────────────────────────────────────────────
    build:
        name: Build Frontend
        runs-on: ubuntu-latest

        steps:
            - name: Checkout código fuente
              uses: actions/checkout@v4

            - name: Configurar Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: 20

            - name: Instalar dependencias
              working-directory: frontend
              run: npm install

            - name: Build de producción
              working-directory: frontend
              env:
                  # Base path = /<nombre-del-repo>/ para que los assets apunten bien en Pages
                  VITE_BASE_PATH: /${{ github.event.repository.name }}/
              run: npm run build

            # Solo sube el artefacto cuando sea push a main (no en PRs)
            - name: Subir artefacto para GitHub Pages
              if: github.ref == 'refs/heads/main' && github.event_name == 'push'
              uses: actions/upload-pages-artifact@v3
              with:
                  path: frontend/dist

    # ── Deploy ─────────────────────────────────────────────────────────────────
    deploy:
        name: Deploy a GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}

        steps:
            - name: Desplegar en GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
